title: Sierpinski Carpet
description: |
  The Sierpiński carpet is a self-similar subset of the unit square formed by
  recursively removing the central third of a 3×3 grid and repeating on the eight
  remaining squares. Panels show orders 2, 3, and 4 of this subdivision, with
  filled tiles indicating the remaining set at each stage.

