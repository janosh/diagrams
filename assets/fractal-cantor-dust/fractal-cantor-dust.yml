title: Fractal Cantor Dust
creator: Luis Enrique Cepeda Alvarado
creator_url: https://orcid.org/0009-0007-6029-4783
description: |
  Cantor dust is a fractal subset of the square obtained by removing the middle
  third of every row and column at each recursion level, keeping only the four
  corner subsquares. Orders 2, 3, and 4 illustrate how the measure of the
  remaining set decreases while topological complexity grows.

