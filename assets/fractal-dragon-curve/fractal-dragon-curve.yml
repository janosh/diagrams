title: Fractal Dragon Curve
creator: Luis Enrique Cepeda Alvarado
creator_url: https://orcid.org/0009-0007-6029-4783
description: |
  The Heighway dragon is a plane-filling fractal curve generated by the
  Lindenmayer system with axiom `FX` and rules `X → X+YF+`, `Y → -FX-Y`. A
  turtle on a square grid draws a segment for each `F` and turns on `+` / `-`.

  The figure shows three iteration orders (5, 9, and 13) of the same grammar.

