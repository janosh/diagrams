title: Fractal Sierpinski Curve
creator: Luis Enrique Cepeda Alvarado
creator_url: https://orcid.org/0009-0007-6029-4783
description: |
  The Sierpiński curve is a space-filling fractal on a hexagonal lattice,
  generated by the L-system `A → B-A-B`, `B → A+B+A` with both symbols
  drawing forward. Three even-order stages (2, 4, and 6) show the progressive
  refinement of the curve that visits every point of a Sierpiński-type partition.

