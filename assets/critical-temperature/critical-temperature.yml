description: A plot illustrating a temperature-dependent phase transition as a function of the critical temperature ($T_c$). The orange curve shows the order parameter ($m_c$) as a function of temperature, which vanishes continuously at $T_c$. The blue and red curves represent the mathematical components of the order parameter expression near the transition.
