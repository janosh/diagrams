name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/cache@v5
        with:
          path: site/node_modules/.cache/imagetools
          key: imagetools-${{ hashFiles('assets/**/*.png') }}
          restore-keys: imagetools-
      - name: Install site dependencies
        # pinned pnpm via corepack; --ignore-scripts skips sharp's build script
        # (it ships prebuilt @img binaries) so pnpm doesn't fail on it
        run: corepack enable && pnpm install --ignore-scripts
        working-directory: site
      - run: pnpm exec vp build
        working-directory: site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
