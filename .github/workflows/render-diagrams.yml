name: Update rendered assets for changed Typst sources

on:
  pull_request:
    branches: [main]
    paths: [assets/**/*.typ]

jobs:
  update-assets:
    name: Update assets
    runs-on: ubuntu-latest
    # don't run on forks and only if PR was opened from branch on this repo
    if: github.repository_owner == 'janosh' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          # get full history to include BASE_REF commit where PR branched off
          fetch-depth: 0

      - name: Get changed Typst source files
        id: diff
        run: |
          BASE_REF=${{ github.event.pull_request.base.sha }}
          typst_files=()

          while IFS= read -r changed_file; do
            case "$changed_file" in
              assets/_shared/*.typ)
                shared_name=${changed_file##*/}
                while IFS= read -r consumer_file; do
                  typst_files+=("$consumer_file")
                done < <(git grep -l -F "../_shared/$shared_name" -- 'assets/**/*.typ' || true)
                ;;
              assets/*.typ) typst_files+=("$changed_file") ;;
            esac
          done < <(git diff --name-only --diff-filter=ACMR "$BASE_REF" "$GITHUB_SHA")

          typst_output=$(printf '%s\n' "${typst_files[@]}" | sort -u | xargs)
          echo "Typst files: $typst_output"
          echo "typst-files=$typst_output" >> "$GITHUB_OUTPUT"

      - name: Install compression deps
        if: steps.diff.outputs.typst-files != ''
        run: |
          sudo apt-get install -y pngquant zopfli
          sudo snap install svgo

      - name: Install Typst
        if: steps.diff.outputs.typst-files != ''
        uses: typst-community/setup-typst@v5

      - name: Render changed Typst sources
        if: steps.diff.outputs.typst-files != ''
        id: render-diagrams
        run: |
          for typst_file in ${{ steps.diff.outputs.typst-files }}; do
            echo "Processing $typst_file..."
            python scripts/render_typst.py "$typst_file"
          done

      - name: Push changes if any
        if: steps.render-diagrams.outcome == 'success'
        run: |
          git config user.name 'Janosh Riebesell'
          git config user.email janosh.riebesell@gmail.com
          git checkout ${{ github.head_ref }}
          git add -A -- 'assets/**/*.pdf' 'assets/**/*.svg' 'assets/**/*.png'
          git diff --cached --quiet || git commit -m 'Update rendered diagram assets'
          git push
